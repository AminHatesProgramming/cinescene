name: Validate CineScene PWA

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pwa-validation
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate static PWA files
        run: |
          test -f docs/index.html
          test -f docs/manifest.webmanifest
          test -f docs/sw.js
          test -f docs/assets/app.js
          test -f docs/assets/styles.css
          test -f docs/data/catalog.sample.json
          python -m json.tool docs/manifest.webmanifest > /dev/null
          python -m json.tool docs/data/catalog.sample.json > /dev/null

      - name: Validate browser JavaScript
        run: node --check docs/assets/app.js
